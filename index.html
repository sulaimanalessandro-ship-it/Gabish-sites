<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GABISH | Future Tech Store</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00d4ff;
            --dark: #050505;
            --card: #111115;
            --text: #ffffff;
            --glass: rgba(255, 255, 255, 0.05);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--dark);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            padding-top: 80px;
        }

        /* BARRA IN ALTO */
        header {
            position: fixed;
            top: 0;
            width: 100%;
            height: 80px;
            background: rgba(5, 5, 5, 0.9);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid var(--glass);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 50px;
            z-index: 1000;
        }

        .logo-container { display: flex; align-items: center; gap: 15px; }
        .logo-gb {
            width: 40px; height: 40px; border: 2px solid var(--primary);
            display: flex; align-items: center; justify-content: center;
            font-family: 'Orbitron', sans-serif; font-weight: bold; color: var(--primary);
            box-shadow: 0 0 10px var(--primary);
        }

        /* CARRELLINO IN ALTO A DESTRA */
        .cart-icon {
            position: relative;
            cursor: pointer;
            background: var(--glass);
            padding: 10px 20px;
            border-radius: 30px;
            border: 1px solid var(--primary);
            transition: 0.3s;
        }
        .cart-icon:hover { background: var(--primary); color: black; }
        #cart-count { font-weight: bold; margin-left: 5px; }

        /* MODALE CARRELLO (NASCOSTO DI BASE) */
        #cart-modal {
            display: none;
            position: fixed;
            top: 90px;
            right: 50px;
            width: 350px;
            background: var(--card);
            border: 1px solid var(--primary);
            border-radius: 15px;
            padding: 20px;
            z-index: 2000;
            box-shadow: 0 10px 50px rgba(0,0,0,0.8);
        }

        /* NEGOZIO */
        .container { max-width: 1200px; margin: 0 auto; padding: 40px 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; }
        .card {
            background: var(--card); border-radius: 20px; padding: 20px;
            border: 1px solid var(--glass); transition: 0.4s; text-align: center;
        }
        .card:hover { transform: translateY(-5px); border-color: var(--primary); }
        .card img { width: 100%; height: 200px; object-fit: cover; border-radius: 15px; }

        .btn {
            background: var(--primary); color: black; border: none; padding: 12px;
            border-radius: 10px; font-weight: bold; width: 100%; cursor: pointer;
        }

        /* PAYPAL BUTTON */
        .btn-paypal {
            background: #ffc439; color: black; border: none; padding: 15px;
            border-radius: 10px; font-weight: bold; width: 100%; cursor: pointer;
            margin-top: 15px; display: none;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo-container">
